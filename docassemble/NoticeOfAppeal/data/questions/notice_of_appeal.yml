template: contact_info_help
subject: |
  **Why do I need to include this?**
content: |  
  The court must be able to reach you, so you need to include some contact information.
---
id: user e-signature
question: |
  Do you want to add your e-signature to your forms?
subquestion: |
  This program can put "**/s/ ${users[0].name_full()}**" where you would sign your name. The court will accept this as your signature.

  If you do not add your **{e-signature}**, you must sign your paper forms before you file and deliver them.

  <div class="alert alert-info ilao-info" role="alert">
    <h6 class="alert-heading">What it means to sign your forms</h6>
    <p>By signing your court forms you are certifying that:</p>
    <p><ul>
      <li>Everything in the forms is true and correct, or you have been informed or you believe it to be true and correct, and</li>
      <li>You understand that making a false statement on the forms is perjury and has penalties provided by law.</li>
    </ul></p>
  <p>See the <a href="https://www.ilga.gov/legislation/ilcs/documents/073500050k1-109.htm"><b>Illinois Code of Civil Procedure, 735 ILCS 5/1-109</b></a> for more information.</p>
  </div>
fields:
  - "Add e-signature?": e_signature
    datatype: yesnoradio
terms:
  - "e-signature": |
      An e-signature is an electronic signature. It is a digital version of a signature that has the same effect as a hand-written signature. 
---
id: other signature
continue button field: other_signature
question: |
  ${get_co_appellant().name_full()}'s signature
subquestion: |
  ${get_co_appellant().name_full()} will need to sign the *Notice of Appeal*. You will need to print a copy and have them sign it before you file your forms with the appellate court.
---
id: next steps
continue button field: next_steps
question: |
  Next steps
subquestion: |
  % if late_appeal:
  <div class="alert alert-info ilao-info" role="alert">
  <h6 class="alert-heading">Past the deadline</h6>
  <p>The main order or judgment in your <i>Notice of Appeal</i> is past the filing deadline.</p>
  <p>To ask for more time, file a motion for leave to file a late *Notice of Appeal* with the appellate court within 30 days of when your <i>Notice of Appeal</i> was originally due. You must attach your <i>Notice of Appeal</i> to the motion.</p>
   <p>The appellate court does not have to give you more time to file your <i>Notice of Appeal</i>. The appellate court may dismiss your appeal if you do not have a "reasonable excuse" for filing a late Notice of Appeal. You can use the <a href="https://www.illinoiscourts.gov/forms/approved-forms/approved-statewide-forms-appellate-forms/motion/"><b>Appellate Motion form on the Illinois Courts website</b></a> to request an extension of time.</p>
   </div>
  
  % endif
  After you download your forms,  you will need to serve your forms to all other parties in the case and file them with the trial court that heard your case. This program **does not file** your forms for you. 

  You will need to file a *Docketing Statement* in the appellate court withn 14 days of filing your *Notice of Appeal*. You can find the *Docketing Statement* form and instructions at the [**Illinois Courts website**](https://www.illinoiscourts.gov/documents-and-forms/approved-forms/appellate-forms/docketing-statement/).
---
id: forms assembling
continue button field: forms_assembling
question: |
  Almost done
subquestion: |
  After you click **Next**, it may take a few moments to finish making your forms.
  
  ###### You do not need to refresh your screen. Hang in there!
  
