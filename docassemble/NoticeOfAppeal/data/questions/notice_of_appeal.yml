          % endif
    - "party_hand_address": ${x.address if x.knows_delivery_method and x.physical_delivery and x.hand_delivery else ""}
    - "party_jail_name": ${x.delivery_jail_name if x.knows_delivery_method and x.physical_delivery and x.jail_delivery else ""}
