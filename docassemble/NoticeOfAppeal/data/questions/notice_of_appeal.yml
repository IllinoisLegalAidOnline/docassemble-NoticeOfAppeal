          ${delivery_parties[2].delivery_mail_address }, ${delivery_parties[2].delivery_mail_city}, ${ state_name(delivery_parties[2].delivery_mail_state) }
          % elif delivery_parties[2].delivery_mail_address != "" and delivery_parties[2].delivery_mail_city != "":
          ${delivery_parties[2].delivery_mail_address }, ${delivery_parties[2].delivery_mail_city}
          % elif delivery_parties[2].delivery_mail_address != "" and delivery_parties[2].delivery_mail_state != "":
          ${delivery_parties[2].delivery_mail_address }, ${ state_name(delivery_parties[2].delivery_mail_state) }
