id: appeal type
question: |
  What type of appeal are you filing?
subquestion: |
  Since someone else in your case has filed an appeal, you must either **join the appeal**, file a **separate appeal**, or file a **cross appeal**.

  You can click the ${ fa_icon("question-circle", color_css="#0dcaf0" ) } by an option to see an example of that type of appeal.
fields:
  - no label: appeal_type
    input type: radio
    choices:
      - I am **joining another party's appeal**. I am adding my name to the other party's Notice of Appeal.: join
        help: |
          With a separate appeal, you can go against the other party or appeal a different order than them.          
          For example, if two roommates are evicted and one roommate appeals the eviction, the other roommate can join the appeal.
      - I am **filing a separate appeal**. Another party has appealed but I am not joining their appeal.: separate
        help: |
          With a separate appeal, you can go against the other party or appeal a different order than them.           
          For example, if two roommates are evicted and one roommate appeals only the eviction order, the other roommate can file a separate appeal to attack an order for past-due rent.
      - I am **filing a cross appeal** to respond to another party's appeal or to file an appeal against a party who already filed an appeal.: cross
        help: |
          With a cross appeal, you can attack an order or part of an order that wrongly gave relief to the appellant.         
          For example, if a landlord gets an eviction order against a tenant but the court does not award past due rent, the tenant can appeal the eviction. The landlord can cross appeal the denial of rent.
