          ${delivery_parties[2].delivery_mail_address}
          % elif delivery_parties[2].delivery_mail_city != "":
          ${delivery_parties[2].delivery_mail_city}
          % else:
          ${state_name(delivery_parties[2].delivery_mail_state)}
          % endif
          % else:
          ${ "" }
          % endif
    - "delivery_party_3_hand": ${delivery_parties[2].hand_delivery if delivery_parties[2].knows_delivery_method and delivery_parties[2].physical_delivery else False}
    - "delivery_party_3_hand_address": ${delivery_parties[2].address if delivery_parties[2].knows_delivery_method and delivery_parties[2].physical_delivery and delivery_parties[2].hand_delivery else ""}
    - "delivery_party_3_from_jail": ${delivery_parties[2].jail_delivery if delivery_parties[2].knows_delivery_method and delivery_parties[2].physical_delivery else ""}
    - "delivery_party_3_jail_name": ${delivery_parties[2].delivery_jail_name if delivery_parties[2].knows_delivery_method and delivery_parties[2].physical_delivery and delivery_parties[2].jail_delivery else ""}
    - "delivery_party_3_date": ${ delivery_parties[2].delivery_date if delivery_parties[2].knows_delivery_method and delivery_parties[2].knows_delivery_date else '' }
    - "delivery_party_3_time": ${ format_time(delivery_parties[2].delivery_time, format='h:mm a') if delivery_parties[2].knows_delivery_method and delivery_parties[2].knows_delivery_time else '' }
    - "no_second_delivery": ${True if delivery_parties.number_gathered() < 2 else False}
    - "yes_second_delivery": ${True if delivery_parties.number_gathered() >= 2 else False}
    - "no_third_delivery": ${True if delivery_parties.number_gathered() < 3 else False}
    - "yes_third_delivery": ${True if delivery_parties.number_gathered() >= 3 else False}
    - "additional_proof": ${True if delivery_parties.number_gathered() > 3 else False}
