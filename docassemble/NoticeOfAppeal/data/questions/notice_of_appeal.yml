id: welcome
question: |
  Notice of appeal
subquestion: |
  Welcome to Illinois Legal Aid Online's **Notice of appeal** Easy Form.

  This program helps you make a *Notice of appeal*. You can use it to tell the court and other parties in your case that you are appealing a decision by the trial court judge

  To learn more, read ILAO's article about [**appealing a circuit court decision**](https://www.illinoislegalaid.org/node/169561).
field: sees_nav_bar
---
id: instructions
continue button field: how_to_use
question: |
  Instructions
subquestion: |
  To use this program you will need: 

  * A copy of each order you want to appeal,
  * Name and address of any other parties in the case,
  * Name and address of any other parties' lawyers, and
  * To know if any other appeals have already been filed in the case.

  Set aside 10 to 20 minutes to finish this program. You can log in and save your work to continue later. 
 
  ${ collapse_template(help_example) }  

  Click on **{green words}** to learn what they mean. Some pages have a question mark in a circle ${ fa_icon("question-circle", color_css="#0dcaf0" ) } that helps explain things.
---
template: help_example
subject: |
  **You can click sections like this to show more information.**
content: |  
  This is an example of help. Click again to hide.
---
id: about appeals
continue button field: about_appeals
question: |
  About filing an appeal
subquestion: |
  An appeal is a request to change a trial court's decision. A court that hears appeals is called an appellate court. An appellate court can change part of or all of a trial court's decision, make the trial court rehear the case, or grant other types of relief.

  You can start an appeal by filing a Notice of Appeal. If someone else in the case has filed an appeal, you can use a Notice of Appeal to join their appeal, file an appeal replying to their appeal, or file a separate appeal.

  Usually you need to file a Notice of Appeal within 30 days of the court's decision. If someone else in the case has filed a post-judgment motion, you need to file within 30 days of the court ruling on their motion. If you are appealing a temporary restraining order or the denial of one, you must file within 2 days.
---
id: order date
question: |
  What is the date the order or judgment you want to appeal?
subquestion: |
  This is the date the court issued its ruling.
fields:
  - Order date: order_date
    datatype: date
    max: ${ today().format("yyyy-MM-dd") }
---
id: final judgment
question: |
  Is the ${order_date} order the final judgment in your case?
fields:
  - no label: final_judgment
    datatype: yesnoradio
---
id: special findings
question: |
  Does the ${order_date}  order include "special findings" that can be appealed right away?
subquestion: |
  Some orders can be appealed that affect only part of the case. These orders have "special findings" that say "there is no just reason for delaying either enforcement or appeal or both."

  Supreme Court Rule 304(a) lets you appeal orders that have "special findings." These orders will say, "there is no just reason for delaying either enforcement or appeal or both."
fields:
  - no label: special_findings
    datatype: yesnoradio
---
id: special type
question: |
  Is the ${order_date} order a special type listed in Supreme Court Rule 304(b)?
subquestion: |
  Some orders can be appealed if they are a special type listed in Supreme Court Rule 304(b). An allocation of parental responsibilities, also known as custody, is one such order. 

  ${collapse_template(special_type_list)}
fields:
  - no label: special_type
    datatype: yesnoradio
---
template: special_type_list
subject: |
  **List of special types of orders**
content: |
  Under Supreme Court Rule 304(b), you can appeal:

  * An allocation of parental responsibilities (formerly custody) judgment or modification of such judgment,
  * A judgment or order entered in the administration of an estate, guardianship, or similar proceeding which finally determines a right or status of a party,
  *  A judgment or order entered in the administration of a receivership, rehabilitation, liquidation, or other similar proceeding which finally determines a right or status of a party and which is not appealable under Rule 307(a),
  * A judgment or order granting or denying any of the relief prayed in a petition under section 2-1401 of the Code of Civil Procedure,
  * A final judgment or order entered in a proceeding under section 2-1402 of the Code of Civil Procedure, or
  * An order finding a person or entity in contempt of court which imposes a monetary or other penalty.
---
id: is tro
question: |
  Did the ${order_date} order grant or deny a temporary restraining order?
subquestion: |
  A temporary restraining order (TRO) is an order from a judge telling someone not to do something. It usually lasts a short period of time until a court can have a full hearing with both parties.
fields:
  - no label: is_tro
    datatype: yesnoradio
---
id: tro too old
continue button field: tro_too_old
question: |
  Deadline missed
subquestion: |
  You must file an appeal of a temporary restraining order (TRO) within 2 days.

  It has been ${date_difference(starting=order_date, ending=today())} since the TRO was entered.

   You may ask for more time to file your *Notice of Appeal*. To do so, file a motion for leave to file a late Notice of Appeal with the appellate court within 30 days of when your *Notice of Appeal* was originally due. You must attach your Notice of Appeal to the motion and pay a $50 filing fee. If you cannot afford to pay the filing fee, you can ask the court to file for free or at a reduced cost by filing an Appellate Fee Waiver.

  **Note:** the appellate court does not have to give you more time to file your *Notice of Appeal*. The appellate court may dismiss your appeal if you do not have a “reasonable excuse” for filing a late Notice of Appeal. You can use the [**Appellate Motion form on the Illinois Supreme Court's website**](https://www.illinoiscourts.gov/forms/approved-forms/approved-statewide-forms-appellate-forms/motion/) to request an extension of time.

  Click **Back** if you made a mistake, or **Next** to keep going.
---
id: rule 307 order
question: |
  Is the ${order_date} order one of the kinds listed in Supreme Court Rule 307(a)?
subquestion: |
  Some orders can be appealed part-way through a case, such as an order terminating parental rights. These types of orders are listed in Supreme Court Rule 307(a).

  ${collapse_template(list_307)}
fields:
  - no label: rule_307_order
    datatype: yesnoradio
---
template: list_307
subject: |
  **List of Rule 307(a) orders**
content: |
  Under Supreme Court Rule 307(a), you can file an appeal of orders that:

  * Terminate parental rights or grant, deny, or revoke temporary commitment in adoption proceedings,
  * Grant or change an injunction,
  *  Appoint or refuse to appoint a receiver or sequestrator,
  * Give or refuse to give other or further powers or property to a receiver or sequestrator already appointed,
  * Place or refuse to place a mortgagee in possession of mortgaged premises,
  * Appoint or refuse to appoint a receiver, liquidator, rehabilitator, or other similar officer for a bank, savings and loan association, currency exchange, insurance company, or other financial institution, or grant or refuse to grant custody of the institution or require turnover of any of its assets, or
  * Determine issues raised in proceedings to exercise the right of eminent domain.
---
id: ex parte order
question: |
  Was the ${order_date} order entered ex parte? 
subquestion: |
  The order was entered ex parte if you did not learn about it until after it was entered.

  When you are in a court case, you must be notified before the judge orders against you. The people on the other side of the case have to give you "notice." They must tell you that they are asking the judge to do something that could affect you.

  If you did not receive notice of the court date when this order was entered, click **Yes**.
fields:
  - no label: ex_parte_order
    datatype: yesnoradio
---
id: motion to vacate
question: |
  Did you file a *Motion to Vacate*?
subquestion: |
  To appeal the ${order_date} order, you must first file a *Motion to Vacate*.

  A *Motion to Vacate* asks the court to set aside the judgment or order that was entered.

  If you want to file a *Motion to Vacate*, you can use ILAO's [**Vacate default judgment within 30 days Easy Form**](https://www.illinoislegalaid.org/node/30866).
fields:
  - no label: motion_to_vacate
    datatype: yesnoradio
  - When did you file your *Motion to Vacate*?: vacate_file_date
    datatype: date
    max: ${today()}
    show if: motion_to_vacate
---
id: vacate first
event: vacate_first
question: |
  Sorry
subquestion: |
  You have to file *Motion to Vacate* the ${order_date} order before you can file an appeal.

  If you want to file a *Motion to Vacate*, you can use ILAO's [**Vacate default judgment within 30 days Easy Form**](https://www.illinoislegalaid.org/node/30866).

  If you made a mistake, you can click the **Back** button or **Restart** the interview.
buttons:
  - Exit: exit
  - Restart: restart
---
id: vacate denied
question: |
  Did the court deny your *Motion to Vacate* the ${order_date} order?
fields:
  - no label: vacate_denied
    datatype: yesnoradio
  - When did the court deny your *Motion to Vacate*?: vacate_denial_date
    datatype: date
    max: ${today()}
    show if: vacate_denied
---
id: post vacate late
continue button field: post_vacate_late
question: |
  Deadline missed
subquestion: |
  You must file an appeal within 30 days after a *Motion to Vacate* is denied.

  It has been ${int(date_difference(starting=vacate_denial_date, ending=today()))} days since the *Motion to Vacate* was denied.

  You may ask for more time to file your *Notice of Appeal*. To do so, file a motion for leave to file a late Notice of Appeal with the appellate court within 30 days of when your *Notice of Appeal* was originally due. You must attach your Notice of Appeal to the motion and pay a $50 filing fee. If you cannot afford to pay the filing fee, you can ask the court to file for free or at a reduced cost by filing an Appellate Fee Waiver.

  **Note:** the appellate court does not have to give you more time to file your *Notice of Appeal*. The appellate court may dismiss your appeal if you do not have a “reasonable excuse” for filing a late Notice of Appeal. You can use the [**Appellate Motion form on the Illinois Supreme Court's website**](https://www.illinoiscourts.gov/forms/approved-forms/approved-statewide-forms-appellate-forms/motion/) to request an extension of time.

  Click **Back** if you made a mistake, or *Next** to keep going.
---
id: wait 7 days
event: wait_7_days
question: |
  Sorry
subquestion: |
  You must wait at least 8 days after you filed your *Motion to Vacate* before you appeal the ${order_date} order.

  It has been  ${date_difference(starting=vacate_file_date, ending=today())} days since the *Motion to Vacate* was filed.

  **Note:** You must file your appeal between 8 days and 30 days after you filed your *Motion to Vacate*.

  If you made a mistake, you can click the **Back** button or **Restart** the interview.
buttons:
  - Exit: exit
  - Restart: restart
---
id: vacate appeal too late
continue button field: vacate_appeal_too_late
question: |
  Deadline missed
subquestion: |
  Since the court did not rule on your Motion to Vacate, you must file your appeal in the following period:

  * You must wait at least 8 days after you filed your *Motion to Vacate*, and
  * You must file your appeal no later than 30 days from when you filed your *Motion to Vacate*.
 
  It has been ${int(date_difference(starting=vacate_file_date, ending=today()))} days since the Motion to Vacate was filed.

  You may ask for more time to file your *Notice of Appeal*. To do so, file a motion for leave to file a late Notice of Appeal with the appellate court within 30 days of when your *Notice of Appeal* was originally due. You must attach your Notice of Appeal to the motion and pay a $50 filing fee. If you cannot afford to pay the filing fee, you can ask the court to file for free or at a reduced cost by filing an Appellate Fee Waiver.

  **Note:** the appellate court does not have to give you more time to file your *Notice of Appeal*. The appellate court may dismiss your appeal if you do not have a “reasonable excuse” for filing a late Notice of Appeal. You can use the [**Appellate Motion form on the Illinois Supreme Court's website**](https://www.illinoiscourts.gov/forms/approved-forms/approved-statewide-forms-appellate-forms/motion/) to request an extension of time.

  Click **Back** if you made a mistake, or *Next** to keep going.
---
id: not appealable
event: not_appealable
question: |
  Sorry
subquestion: |
  The ${order_date} order is not eligible for appeal using this program.

  You may want to talk with a lawyer to discuss your options. Use **[Get Legal Help](https://www.illinoislegalaid.org/get-legal-help)** to find free or low-cost legal services in your area.

  If you made a mistake, you can click the **Back** button or **Restart** the interview.
buttons:
  - Exit: exit
  - Restart: restart
---
id: motion to reconsider
question: |
  Did any party in the case file a *Motion to Reconsider* or a similar post-judgment motion?
fields:
  - no label: motion_to_reconsider
    datatype: yesnoradio
---
id: court rule on post motion
question: |
  Has the trial court ruled on a *Motion to Reconsider* or a similar post-judgment motion?
subquestion: |
  If the court has granted or denied the motion, they have "ruled" on it. 

  If the court continued the case without ruling on the motion, click **No**.
fields:
  - no label: court_rule_on_post_motion
    datatype: yesnoradio
  - When did the court rule on the post-judgment motion?: reconsider_ruling_date
    datatype: date
    max: ${ today()}
    show if: court_rule_on_post_motion
    help: |
      On the day that the judge ruled on the *Motion to Reconsider*, an order should have been entered in the case. On that order is a date that tells you when the court ruled on the Motion. It may be by the judge's signature.
---
id: ruling pending kickout
event: ruling_pending_kickout
question: |
  Sorry
subquestion: |
  The ${order_date} order cannot be appealed until the court rules on the *Motion to Reconsider* or other post-judgment motion.

  If you made a mistake, you can click the **Back** button or **Restart** the interview.
buttons:
  - Exit: exit
  - Restart: restart
---
id: post judgment appeal late
continue button field: post_judgment_appeal_late
question: |
  Deadline missed
subquestion: |
  You must file your appeal within 30 days after the court ruled on the *Motion to Reconsider* or other post-judgment motion.

  It has been ${date_difference(starting=reconsider_ruling_date, ending=today())} since the Motion to Vacate was filed.

  You may ask for more time to file your *Notice of Appeal*. To do so, file a motion for leave to file a late Notice of Appeal with the appellate court within 30 days of when your *Notice of Appeal* was originally due. You must attach your Notice of Appeal to the motion and pay a $50 filing fee. If you cannot afford to pay the filing fee, you can ask the court to file for free or at a reduced cost by filing an Appellate Fee Waiver.

  **Note:** the appellate court does not have to give you more time to file your *Notice of Appeal*. The appellate court may dismiss your appeal if you do not have a “reasonable excuse” for filing a late Notice of Appeal. You can use the [**Appellate Motion form on the Illinois Supreme Court's website**](https://www.illinoiscourts.gov/forms/approved-forms/approved-statewide-forms-appellate-forms/motion/) to request an extension of time.

  Click **Back** if you made a mistake, or **Next** to keep going.
---
id: order eligible
continue button field: order_eligible
question: |
  % if late_appeal:
  Appealing an order
  % else:
  Good news! 
  % endif
subquestion: |
 % if late_appeal:
  You missed the deadline to appeal the ${order_date} order. However, you may still be able to appeal if:
 
  * You ask the appellate court to extend the filing deadline, and
  * The appellate court grants your request.

  ${collapse_template(extend_deadline_info)}

  You must attach a copy of the *Notice of Appeal* to your request.
 % else:
  The ${order_date} order can be appealed.
 % endif
---
template: extend_deadline_info
subject: |
  **Asking the appellate court to extend a deadline**
content: |
  You may ask for more time to file your *Notice of Appeal*. To do so, file a motion for leave to file a late Notice of Appeal with the appellate court within 30 days of when your *Notice of Appeal* was originally due. You must attach your Notice of Appeal to the motion and pay a $50 filing fee. If you cannot afford to pay the filing fee, you can ask the court to file for free or at a reduced cost by filing an Appellate Fee Waiver.

  **Note:** the appellate court does not have to give you more time to file your *Notice of Appeal*. The appellate court may dismiss your appeal if you do not have a “reasonable excuse” for filing a late Notice of Appeal. You can use the [**Appellate Motion form on the Illinois Supreme Court's website**](https://www.illinoiscourts.gov/forms/approved-forms/approved-statewide-forms-appellate-forms/motion/) to request an extension of time.
---
reconsider: True
code: |
  if final_judgment or special_findings or special_type:
    if not motion_to_reconsider:
      if today().minus(days=30) > order_date:
        late_appeal = True
      else:
        late_appeal = False
    elif today().minus(days=30) > reconsider_ruling_date:
      late_appeal = True
    else:
      late_appeal = False
  elif is_tro:
    if today().minus(days=2) > order_date:
      late_appeal = True
    else:
      late_appeal = False
  elif rule_307_order and ex_parte_order and motion_to_vacate:
    if vacate_denied:
      if today().minus(days=30) > vacate_denial_date:
        late_appeal = True
      else:
        late_appeal = False
    elif today().minus(days=30) > vacate_file_date:
      late_appeal = True
    else:
      late_appeal = False
  #These last few lines aren't intended to catch any specific situation, they are a failsafe in case there is a pathway not caught by the rest of this codeblock.
  elif today().minus(days=30) > order_date:
    late_appeal = True
  else:
    late_appeal = False
---
id: other orders there are any
question: |
  Do you want to add more orders to your appeal?
subquestion: |
  You can add up to 2 additional orders to your *Notice of Appeal* if they led to the ${order_date} order or judgment.
fields:
  - no label: other_orders.there_are_any
    datatype: yesnoradio
---
id: other orders date
question: |
  What is the date of the ${ordinal(i)} other order you want to appeal?
fields:
  - Order date: other_orders[i].date
    datatype: ThreePartsDate
    alMax: ${ order_date }
---
id: other orders there is another
question: |
  Do you want to list another order on your appeal?
subquestion: |
  So far you have told us about the ${order_date} order and the ${other_orders[0].date} order.
fields:
  - no label: other_orders.there_is_another
    datatype: yesnoradio
---
id: relief types
question: |
  What do you want the appellate court to do?
subquestion: |
  ${collapse_template(reverse_info)}

  ${collapse_template(vacate_info)}

  ${collapse_template(change_info)}
fields: 
  - I want the appellate court to reverse the order: reverse
    datatype: yesnowide
    help: |
      Click this if you want the appellate court to send the case back to the trial court for any hearings that are still required.
  - I want the appellate court to vacate the order: vacate
    datatype: yesnowide
    help: |
      Click this if you want the appellate court to send the case back to the trial court for a new hearing and a new judgment. 
  - I want the appellate court to change the order: change
    datatype: yesnowide
  - What do you want the order to be changed to say?: change_text
    input type: area
    rows: 3
    maxlength: 250
    show if: change
  - I want the appellate court to make the trial court do something.: make
    datatype: yesnowide
  - What do you want the appellate court to make the trial court do?: make_text
    input type: area
    rows: 3
    maxlength: 250
    show if: make
  - Something else: other 
    datatype: yesnowide
  - What do you want the appellate court to do?: other_text
    input type: area
    rows: 3
    maxlength: 250
    show if: other
validation code: |
  if not reverse and not vacate and not change and not make and not other:
    validation_error("You need to pick something you want the appellate court to do.")
---
template: reverse_info
subject: |
  **About reversing the order or judgment**
content: |
  **Reverse the order or judgment**: This means the appellate court changing a judgment in your opponent’s favor into a judgment in your favor.

  For example, if you were the defendant and you argue that the plaintiff failed to prove their case, you want the appellate court to change the judgment in the plaintiff’s favor into a judgment in your favor. If other hearings are needed, you may also ask the court to send the case back to the trial court for those hearings.
---
template: vacate_info
subject: |
  **About vacating the order or judgment**
content: |
  **Vacate the order or judgment**: This means the appellate court erasing the judgment that was in your opponent’s favor. Usually the appellate court sends the case back to the trial court for a new hearing.

  For example, if you were the defendant and you argue that the trial was unfair, you are arguing that the appellate court should erase the judgment in the plaintiff’s favor and send the case back to the trial court for a new trial and a new judgment.
---
template: change_info
subject: |
  **About changing the order or judgment
content: |
  **Change the order or judgment**: This means the appellate court changing what the judgment says.

  For example, if you argue that the trial court awarded you an amount that was too low, you may ask the appellate court to change the award to a higher amount
---
id: other appeals
question: |
  Has anyone else in the case filed an appeal?
subquestion: |
  If someone has filed an appeal on any order that was a part of this case, click **Yes**.
fields:
  - no label: other_appeals
    datatype: yesnoradio
---
id: joining appeal
question: |
  Are you joining the appeal of another party?
subquestion: |
  Click **Yes** if you are appealing the same order as another party in the case and you want the same relief they want.

  You are "joining a prior appeal" if you are the second appellant and you are adding your name to the first appellant’s Notice of Appeal. In this appeal, two appellants proceed together against the appellee. For example, if two roommates are evicted and one roommate appeals the eviction, the other roommate can join the appeal.
fields:
  - no label: joining_appeal
    datatype: yesnoradio
---
id: separate appeal
question: |
  Are you filing a separate appeal?
subquestion: |
  Click **Yes** if someone else filed an appeal but you are:

  * Appealing a different order, or
  * Asking the court to do something different than what the other party who appealed asked.

  You are filing a “separate appeal” if you are the second appellant but you are not joining the first appellant’s Notice of Appeal. In this appeal, you can go against different appellees or attack different orders than the first appellant. For example, if two roommates are evicted and one roommate appeals only the eviction order, the other roommate can file a separate appeal to attack an order for past-due rent.
fields:
  - no label: separate_appeal
    datatype: yesnoradio
---
id: cross appeal
question: |
  Are you filing a cross appeal?
subquestion: |
  Click **Yes** if someone in your case has filed an appeal, and you want to

  * Respond to that appeal, or
  * File your own appeal against that person.

  You would file a "cross appeal" to respond to another party's appeal. You would also file a "cross appeal" if you want to file your own appeal against the appellant. In this appeal, you are the “cross appellant” and can attack an order or part of an order that wrongly gave relief to the appellant. For example, if a landlord gets an eviction order against a tenant but the court does not award past due rent, the tenant can appeal the eviction. The landlord can cross appeal the denial of rent.
fields:
  - no label: cross_appeal
    datatype: yesnoradio
---
id: need appeal type
event: need_appeal_type
question: |
  Sorry
subquestion: |
  If another party has filed an appeal, you must either join their appeal, file a separate appeal, or file a cross appeal.

  If you made a mistake, you can click the **Back** button or **Restart** the interview.
