#interview code block
mandatory: True
code: |
  nav.set_section('section_intro')
  sees_nav_bar
  snapshot_start
  how_to_use
  set_progress(5)
  accept_terms
  about_appeals

  nav.set_section('section_order')
  order_date
  if not final_judgment:
    if not special_findings:
      if not special_type:
        if is_tro:
          if today().minus(days=2) > order_date:
            tro_too_old
        else:
          if rule_307_order:
            if ex_parte_order:
              if motion_to_vacate:
                if vacate_denied:
                  if today().minus(days=30) > vacate_denial_date:
                    post_vacate_late
                  
                else:
                  if today().minus(days=30) > vacate_file_date:
                    vacate_appeal_too_late
                  elif vacate_file_date > today().minus(days=7):
                    wait_7_days
              else:
                vacate_first
          else:
            not_appealable  
  set_progress(20)
  if final_judgment or special_findings or special_type:
    if motion_to_reconsider:
      if court_rule_on_post_motion:
        if today().minus(days=30) > reconsider_ruling_date:
          post_judgment_appeal_late 
      else:
        ruling_pending_kickout
  if final_judgment or special_findings or special_type or is_tro or (rule_307_order and not ex_parte_order) or (rule_307_order and ex_parte_order and motion_to_vacate):
    order_eligible
  else:
    not_appealable
  about_fees
  if other_orders.there_are_any:
    other_orders.gather()

  nav.set_section('section_relief')
  reverse
  set_progress(40)
  if other_appeals:
    appeal_type
   
  nav.set_section('section_case')
  party_label
  users.gather()
  if users.number_gathered() > 1:
    if any_co_appellant():
      get_co_appellant().address.address
      get_co_appellant().email
  if party_label == "plaintiff" or party_label == "petitioner":
    if anyone_opposing:
      other_parties.gather()
  else:
    anyone_opposing = True
    other_parties.gather()
  set_progress(60)
  minor_involved
  if in_re_check:
    in_re_label
  case_number
  if trial_court_index == -1:
    cook_district
  court_county
  judge.name.first
  appellate_district

  nav.set_section('section_delivery')
  if anyone_opposing or users.number_gathered() > 1:
    delivery_intro
    for person in delivery_parties:
      if person.is_represented:
        person.lawyer.name.first
      person.address.address
      if person.knows_delivery_method:
        person.email_delivery
        person.delivery_date
    hand_delivery_info   
  set_progress(80)

  nav.set_section('section_user')
  users[0].address.address
  users[0].has_email_address
  e_signature
  if any_co_appellant():
    other_signature
  next_steps

  nav.set_section('section_download')
  set_progress(100)
  forms_assembling
  refresh_delivery_bundle
  snapshot_forms
  set_progress_to_100_once
  get_docs_screen
