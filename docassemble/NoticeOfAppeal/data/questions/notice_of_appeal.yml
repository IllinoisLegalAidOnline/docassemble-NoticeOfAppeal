    datatype: yesnoradio
    show if: reverse
  - I want the appellate court to **vacate** the order.: vacate
    datatype: yesnowide
  - note: |
      ${collapse_template(vacate_info)}    
  - Do you want the appellate court to send the case back to the trial court for a new hearing?: vacate_send_back
    datatype: yesnoradio
    show if: vacate
  - I want the appellate court to **change** the order.: change
    datatype: yesnowide
  - note: |
      ${collapse_template(change_info)}    
