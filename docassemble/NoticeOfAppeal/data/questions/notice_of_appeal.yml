id: order review screen
event: section_order
section: Trial court order
question: |
  Trial court order
subquestion: |
  Edit your answers below.
review:
  - Edit: order_date
    button: |
      **Order date:**
      ${order_date}
  - Edit: final_judgment
    button: |
      **Is the ${order_date} order the final judgment?**
      ${word(yesno(final_judgment))}
  - Edit: special_findings
    button: |
      **Does the order include "special findings?"**
      ${word(yesno(special_findings))}
    show if: not final_judgment
  - Edit: special_type
    button: |
      **Is the order a special type listed in Supreme Court Rule 304(b)?**
      ${word(yesno(special_type))}
    show if: not final_judgment and not special_findings
  - Edit: is_tro
    button: |
      **Did the order grant or deny a temporary restraining order?**
      ${word(yesno(is_tro))}
    show if: not final_judgment and not special_findings and not special_type
  - Edit: rule_307_order
    button: |
      **Is the order one of the kinds listed in Supreme Court Rule 307(a)?**
      ${word(yesno(rule_307_order))}
    show if: not final_judgment and not special_findings and not special_type and not is_tro
  - Edit: ex_parte_order
    button: |
      **Was the order entered ex parte?**
      ${word(yesno(ex_parte_order))}
    show if: rule_307_order and not final_judgment and not special_findings and not special_type and not is_tro
  - Edit: motion_to_vacate
    button: |
      **Did you file a Motion to Vacate?**
      % if motion_to_vacate:
      Yes, on ${vacate_file_date}
      % else:
      No
      % endif
    show if: ex_parte_order and rule_307_order and not final_judgment and not special_findings and not special_type and not is_tro
  - Edit: vacate_denied
    button: |
      **Did the court deny your Motion to Vacate?**
      % if vacate_denied:
      Yes, on ${vacate_denial_date}
      % else:
      No
      % endif
    show if: motion_to_vacate and ex_parte_order and rule_307_order and not final_judgment and not special_findings and not special_type and not is_tro
  - Edit: motion_to_reconsider
    button: |
      **Did any party file a post-judgment motion?**
      ${word(yesno(motion_to_reconsider))}
    show if: final_judgment or special_findings or special_type
  - Edit: court_rule_on_post_motion
    button: |
      **Has the trial court ruled on the post-judgment motion?**
      % if court_rule_on_post_motion:
      Yes, on ${reconsider_ruling_date}
      % else:
      No
      % endif
    show if: court_rule_on_post_motion and (final_judgment or special_findings or special_type)
  - Edit: other_orders.there_are_any
    button: |
      **Do you want to add more orders to your appeal?**
      ${word(yesno(other_orders.there_are_any))}
  - Edit: other_orders.revisit
    button: |
      **Other orders:**
      
      % for item in other_orders:
        * ${ item.name_full() }
      % endfor
    show if: other_orders.there_are_any
